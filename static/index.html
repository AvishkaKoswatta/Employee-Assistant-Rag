<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-2: #232323;
    --border: #2e2e2e;
    --accent: #c8a97e;
    --accent-dim: rgba(200, 169, 126, 0.12);
    --text: #e8e2d9;
    --text-muted: #7a7570;
    --user-bubble: #1e2a1e;
    --user-border: #2d4a2d;
    --bot-bubble: #1c1c20;
    --bot-border: #2e2e3a;
    --radius: 14px;
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,15,15,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-dim);
    flex-shrink: 0;
  }

  .logo-ring svg { width: 18px; height: 18px; }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf74;
    box-shadow: 0 0 6px #4caf7480;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Suggestions bar */
  .suggestions {
    position: relative;
    z-index: 5;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }

  .suggestions::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Messages */
  #messages {
    position: relative;
    z-index: 5;
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease both;
  }

  .welcome-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }

  .welcome-icon svg { width: 24px; height: 24px; }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 0.875rem;
    color: var(--text-muted);
    line-height: 1.65;
    max-width: 360px;
    margin: 0 auto;
  }

  /* Message rows */
  .msg-row {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot {
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .avatar.user {
    background: #1e2d1e;
    border: 1px solid var(--user-border);
    color: #6daf7a;
  }

  .bubble {
    max-width: 72%;
    padding: 13px 16px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    line-height: 1.7;
    position: relative;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--bot-border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #d4ecd8;
  }

  .bubble strong { color: var(--accent); font-weight: 500; }
  .bubble code {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.82rem;
    font-family: 'Courier New', monospace;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Meta tag under bot bubble */
  .meta {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-top: 5px;
    padding-left: 2px;
    letter-spacing: 0.03em;
  }

  /* Input area */
  footer {
    position: relative;
    z-index: 10;
    padding: 18px 28px 22px;
    border-top: 1px solid var(--border);
    background: rgba(15,15,15,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
    resize: none;
    outline: none;
    max-height: 130px;
    overflow-y: auto;
    line-height: 1.5;
    transition: border-color 0.18s;
    scrollbar-width: none;
  }

  #input::-webkit-scrollbar { display: none; }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-muted); }

  #sendBtn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s ease;
  }

  #sendBtn:hover:not(:disabled) {
    background: var(--accent);
    color: #0f0f0f;
  }

  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  #sendBtn svg { width: 18px; height: 18px; }

  .footer-note {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Error state */
  .bubble.error {
    background: rgba(180, 60, 60, 0.1);
    border-color: rgba(180, 60, 60, 0.3);
    color: #e8a0a0;
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--accent)">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Employee Assistant</h1>
    <p>Handbook · Policies · HR Support</p>
  </div>
  <div class="status-dot">
    <span class="dot"></span>
    Online
  </div>
</header>

<div class="suggestions">
  <button class="chip" onclick="sendChip(this)">What is our leave policy?</button>
  <button class="chip" onclick="sendChip(this)">How do I request time off?</button>
  <button class="chip" onclick="sendChip(this)">What are the working hours?</button>
  <button class="chip" onclick="sendChip(this)">Explain the code of conduct</button>
  <button class="chip" onclick="sendChip(this)">How does performance review work?</button>
  <button class="chip" onclick="sendChip(this)">Remote work guidelines</button>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="color:var(--accent)">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
    <h2>Hello, how can I help?</h2>
    <p>Ask me anything about the employee handbook — policies, benefits, HR procedures, and more.</p>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask about policies, benefits, procedures…"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="footer-note">Answers are sourced from your Employee Handbook · Always verify with HR for critical matters</p>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendChip(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text, isError = false) {
    hideWelcome();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? 'AI' : 'You';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
    bubble.innerHTML = formatText(text);

    if (role === 'bot' && !isError) {
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = 'Employee Handbook · ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      row.appendChild(avatar);
      row.appendChild(Object.assign(document.createElement('div'), {
        style: 'display:flex;flex-direction:column'
      }));
      row.lastChild.appendChild(bubble);
      row.lastChild.appendChild(meta);
    } else {
      row.appendChild(avatar);
      row.appendChild(bubble);
    }

    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function appendTyping() {
    hideWelcome();
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const query = inputEl.value.trim();
    if (!query) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', query);
    appendTyping();

    try {
      const answer = await callRAGPipeline(query);
      removeTyping();
      appendMessage('bot', answer);
    } catch (err) {
      removeTyping();
      appendMessage('bot', 'Sorry, I encountered an error. Please try again.', true);
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  /**
   * ─────────────────────────────────────────────────────────
   * INTEGRATION POINT
   * Replace this function body with your actual RAG backend call.
   *
   * Option A — REST API (FastAPI / Flask):
   *   const res = await fetch('/api/ask', {
   *     method: 'POST',
   *     headers: { 'Content-Type': 'application/json' },
   *     body: JSON.stringify({ query })
   *   });
   *   const data = await res.json();
   *   return data.answer;
   *
   * Option B — Direct Python bridge (if using Eel / PyWebView):
   *   return await eel.answer_question(query)();
   *
   * ─────────────────────────────────────────────────────────
   */
  async function callRAGPipeline(query) {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.answer;
  }
</script>
</body>
</html>
